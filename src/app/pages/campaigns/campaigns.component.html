<div class="campaign-page">

  <!-- FORM -->
  <div class="card form-card">
    <h2>Create Campaign</h2>

    <input [(ngModel)]="name" placeholder="Campaign name" />
    <input [(ngModel)]="topic" placeholder="Topic" />

    <input type="number"
           [(ngModel)]="postNumber"
           min="1"
           [disabled]="showManual" />

    <div class="actions-row">
      <button (click)="generate()">
        {{ loading ? 'Generating...' : 'Generate with AI' }}
      </button>
      <button class="secondary" (click)="createManualCampaign()">
        Create Manual Campaign
      </button>
    </div>
  </div>

  <!-- MANUAL BUTTON -->
  <div class="manual-toggle">
    <button (click)="showManual = !showManual" [disabled]="!campaignId">
      {{ showManual ? 'Cancel' : '+ Manual Post' }}
    </button>
    <span *ngIf="!campaignId" class="warning-tag">
      Create a campaign first
    </span>
  </div>

  <!-- MANUAL FORM -->
  <div *ngIf="showManual && campaignId" class="card manual-card">
    <h3>Create Manual Post</h3>

    <label>Platform</label>
    <select [(ngModel)]="manualPost.platform">
      <option value="LINKEDIN">LinkedIn</option>
      <option value="INSTAGRAM">Instagram</option>
      <option value="FACEBOOK">Facebook</option>
    </select>

    <label>Title</label>
    <input [(ngModel)]="manualPost.title" placeholder="Enter title" />

    <label>Content</label>
    <textarea [(ngModel)]="manualPost.content" placeholder="Write your post..."></textarea>

    <label>Hashtags</label>
    <input [(ngModel)]="manualPost.hashtags" placeholder="AI,Marketing" />

    <label>Scheduled At</label>
    <input type="datetime-local" [(ngModel)]="manualPost.scheduledAt" />
    <small class="hint">Leave empty to keep as draft</small>

    <label class="checkbox">
      <input type="checkbox" [(ngModel)]="manualPost.permanent" />
      Permanent Post
    </label>

    <label>Upload Image</label>
    <input type="file" (change)="onFileSelected($event)" />

    <div *ngIf="previewUrl" class="image-preview">
      <img [src]="previewUrl" />
    </div>

    <div *ngIf="manualPost.platform === 'INSTAGRAM' && !previewUrl" class="warning-msg">
      ⚠ Instagram requires an image
    </div>

    <button (click)="createManualPost()" [disabled]="manualPost.platform === 'INSTAGRAM' && !previewUrl">
      Create Post
    </button>
  </div>

  <!-- POSTS LIST -->
  <div class="posts-section" *ngIf="posts.length > 0">
    <div class="card post-card" *ngFor="let post of posts">

      <div class="top-actions">
        <span class="platform-badge">{{ post.platform }}</span>
        <button class="delete-btn" (click)="delete(post)">Delete</button>
      </div>

      <div class="post-preview">
        <p>{{ post.content }}</p>
        <img *ngIf="post.image?.imageUrl" [src]="post.image.imageUrl" class="post-img" />
      </div>

      <div class="edit-fields">
        <input [(ngModel)]="post.title" />
        <textarea [(ngModel)]="post.content"></textarea>
      </div>

      <div class="post-meta">
        <span>Status: {{ post.status }}</span>
        <span *ngIf="post.scheduledAt">Scheduled: {{ post.scheduledAt | date:'short' }}</span>
      </div>

      <div class="action-buttons">
        <button class="save-btn" (click)="save(post)">Save</button>
        <button class="publish-btn" (click)="publishNow(post)" [disabled]="!post.approved">
          Publish
        </button>
      </div>

    </div>
  </div>

</div>
