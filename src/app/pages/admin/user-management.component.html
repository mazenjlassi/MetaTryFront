<div class="user-management">
  <div class="page-header">
    <h1>User Management</h1>
    <button class="btn-primary" (click)="showCreateForm = !showCreateForm">
      <lucide-icon [img]="icons.userPlus" [size]="18"></lucide-icon>
      Add User
    </button>
  </div>

  <!-- Error Message -->
  <div class="error-message" *ngIf="error">
    {{ error }}
  </div>

  <!-- Create User Form -->
  <div class="create-form" *ngIf="showCreateForm">
    <h3>Create New User</h3>
    <div class="form-grid">
      <div class="form-group">
        <label>Username</label>
        <input type="text" [(ngModel)]="newUser.name" placeholder="Enter username">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="newUser.email" placeholder="Enter email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="newUser.password" placeholder="Enter password">
      </div>
      <div class="form-group">
        <label>Role</label>
        <select [(ngModel)]="newUser.role">
          <option value="MARKETING">Marketing</option>
          <option value="ADMIN">Admin</option>
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-secondary" (click)="showCreateForm = false; resetForm()">Cancel</button>
      <button class="btn-primary" (click)="createUser()" [disabled]="creating">
        <span *ngIf="creating">
          <lucide-icon [img]="icons.loader2" [size]="18" class="spin"></lucide-icon>
        </span>
        {{ creating ? 'Creating...' : 'Create User' }}
      </button>
    </div>
  </div>

  <!-- Users Table -->
  <div class="users-table">
    <div class="table-header">
      <span>User</span>
      <span>Role</span>
      <span>Status</span>
      <span>Actions</span>
    </div>
    
    <div class="loading" *ngIf="loading">
      <lucide-icon [img]="icons.loader2" [size]="24" class="spin"></lucide-icon>
      Loading users...
    </div>

    <div class="table-row" *ngFor="let user of users">
      <div class="user-info">
        <span class="user-name">{{ user.name }}</span>
        <span class="user-email">{{ user.email }}</span>
      </div>
      <div class="user-role">
        <span [class]="'role-badge ' + user.role.toLowerCase()">{{ user.role }}</span>
      </div>
      <div class="user-status">
        <span [class]="'status-badge ' + (user.banned ? 'banned' : 'active')">
          {{ user.banned ? 'Banned' : 'Active' }}
        </span>
      </div>
      <div class="user-actions">
        <button 
          class="btn-icon ban" 
          *ngIf="!user.banned && user.role !== 'ADMIN'"
          (click)="banUser(user.id)"
          title="Ban User"
        >
          <lucide-icon [img]="icons.ban" [size]="16"></lucide-icon>
        </button>
        <button 
          class="btn-icon unban" 
          *ngIf="user.banned"
          (click)="unbanUser(user.id)"
          title="Unban User"
        >
          <lucide-icon [img]="icons.unlock" [size]="16"></lucide-icon>
        </button>
        <button 
          class="btn-icon delete" 
          *ngIf="user.role !== 'ADMIN'"
          (click)="deleteUser(user.id)"
          title="Delete User"
        >
          <lucide-icon [img]="icons.trash2" [size]="16"></lucide-icon>
        </button>
      </div>
    </div>

    <div class="empty-state" *ngIf="!loading && users.length === 0">
      <app-empty-state icon="inbox" heading="No users" message="No users found. Create your first user to get started."></app-empty-state>
    </div>
  </div>
</div>
